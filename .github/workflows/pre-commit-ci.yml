name: pre-commit.ci

on: [push]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.work"

      - name: Install go toolchain for pre-commit
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.10.1
          go install mvdan.cc/gofumpt@latest

      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: -a
      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()
        with:
          msg: |
            chore(deps): [pre-commit.ci] auto fixes\n\nFor more information, see https://pre-commit.ci
